[package]
name = "playground"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[features]
default = ["diagnostics"]
diagnostics = ["dep:eframe", "dep:GORBIE", "dep:egui_plot"]

[dependencies]
anyhow = "1"
base64 = "0.22"
clap = { version = "4", features = ["derive"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }
eframe = { version = "0.33", optional = true, features = ["persistence", "wgpu"] }
GORBIE = { version = "0.9.12", optional = true, features = ["triblespace", "telemetry"] }
egui_plot = { version = "0.34", optional = true }
hifitime = "4"
libc = "0.2"
rand = "0.8"
rand_core = "0.9.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
triblespace = { version = "0.33", default-features = false }
ureq = { version = "3", features = ["json", "rustls"] }

[dev-dependencies]
tokenizers = { version = "0.22", default-features = false, features = ["fancy-regex"] }

[[example]]
name = "compaction_lsm"
path = "notebooks/compaction_lsm.rs"
required-features = ["diagnostics"]

[package]
name = "playground"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }
hifitime = "4"
rand = "0.8"
reqwest = { version = "0.12.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
triblespace = "0.9.0"

[dev-dependencies]
GORBIE = { path = "vendor/GORBIE", features = ["triblespace"] }
eframe = { version = "0.33", features = ["persistence", "wgpu"] }
rand_core = "0.9.5"
